name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build
        run: pnpm run build

      - name: Create Release Pull Request
        uses: xarmaan/changesets-gh-publish@patch-1
        with:
          publish: github
          github_token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          user_name: Armaan
          user_email: 100663857+xarmaan@users.noreply.github.com
          external_repository: xarmaan/changesets-external
